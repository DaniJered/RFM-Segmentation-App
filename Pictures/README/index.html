<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README AI - Futuristic Generator</title>
    <meta name="description" content="Cinematic AI SaaS for README generation">
    
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --bg-space: #050508;
            --accent-cyan: #00E5FF;
            --accent-purple: #9D00FF;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
    }

    @layer base {
        body {
            @apply bg-[var(--bg-space)] text-gray-200 overflow-hidden font-sans;
        }
        /* Custom scrollbar for markdown preview */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    }

    @layer utilities {
        .glass-panel {
            @apply bg-[var(--glass-bg)] backdrop-blur-xl border border-[var(--glass-border)] rounded-3xl shadow-2xl;
        }
        .text-glow-cyan {
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }
        .border-glow-active {
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.3), inset 0 0 20px rgba(0, 229, 255, 0.2);
        }
        
        /* Markdown Styles */
        .markdown-body h1 { @apply text-3xl font-bold mb-4 text-white border-b border-white/10 pb-2; }
        .markdown-body h2 { @apply text-2xl font-semibold mb-3 mt-6 text-white; }
        .markdown-body h3 { @apply text-xl font-medium mb-2 mt-4 text-gray-200; }
        .markdown-body p { @apply text-gray-400 mb-4 leading-relaxed; }
        .markdown-body pre { @apply bg-black/50 border border-white/10 p-4 rounded-xl mb-4 overflow-x-auto; }
        .markdown-body code { @apply font-mono text-sm text-[var(--accent-cyan)]; }
        .markdown-body ul { @apply list-disc list-inside mb-4 text-gray-400 space-y-1; }
        .markdown-body blockquote { @apply border-l-4 border-[var(--accent-purple)] pl-4 italic text-gray-400 my-4; }
    }
    
    @keyframes slow-pan {
        0% { transform: scale(1) translate(0, 0); }
        50% { transform: scale(1.05) translate(-10px, 10px); }
        100% { transform: scale(1) translate(0, 0); }
    }
    
    @keyframes orb-float {
        0%, 100% { transform: translateY(0px) scale(1); opacity: 0.5; }
        50% { transform: translateY(-20px) scale(1.1); opacity: 0.8; }
    }

    .bg-animated-nebula {
        animation: slow-pan 20s ease-in-out infinite;
    }
    .orb-1 { animation: orb-float 8s ease-in-out infinite; }
    .orb-2 { animation: orb-float 12s ease-in-out infinite reverse; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Components -->
    <script type="text/babel" src="components/Background.js"></script>
    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/Workspace.js"></script>
    <script type="text/babel" src="components/Preview.js"></script>
    
    <!-- Main App -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
